name: Collect Traffic Stats

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and merge traffic data
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          mkdir -p data
          gh api repos/${{ github.repository }}/traffic/views > data/traffic_latest.json

          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone

          with open('data/traffic_latest.json') as f:
              latest = json.load(f)

          hist_path = 'data/traffic.json'
          if os.path.exists(hist_path):
              with open(hist_path) as f:
                  hist = json.load(f)
          else:
              hist = {'views': []}

          # Merge views by timestamp (latest wins for overlapping dates)
          by_date = {v['timestamp']: v for v in hist.get('views', [])}
          for v in latest.get('views', []):
              by_date[v['timestamp']] = v
          merged = sorted(by_date.values(), key=lambda x: x['timestamp'])

          result = {
              'count': sum(v['count'] for v in merged),
              'uniques': sum(v.get('uniques', 0) for v in merged),
              'views': merged,
              'updated': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          }

          with open(hist_path, 'w') as f:
              json.dump(result, f, indent=2)
          PYEOF

          rm -f data/traffic_latest.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update traffic stats $(date -u +%Y-%m-%d)"
          git push
