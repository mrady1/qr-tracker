<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Redirecting...</title>
</head>
<body>
  <p>Redirecting to <a href="https://www.cbre.com/people/conor-brennan#properties">Conor Brennan Listings</a>...</p>
  <script>
    var API = "https://api.counterapi.dev/v1/mrady1-qr/cb-postcard/up";
    var DEST = "https://www.cbre.com/people/conor-brennan#properties";

    // Method 1: sendBeacon (survives page navigation)
    if (navigator.sendBeacon) {
      navigator.sendBeacon(API);
    }

    // Method 2: fetch with keepalive
    try { fetch(API, {keepalive: true}); } catch(e) {}

    // Method 3: image pixel
    (new Image()).src = API + "?t=" + Date.now();

    // Method 4: XMLHttpRequest (sync, blocks until sent)
    try {
      var x = new XMLHttpRequest();
      x.open("GET", API + "?x=" + Date.now(), false);
      x.send();
    } catch(e) {}

    // Now redirect
    window.location.replace(DEST);
  </script>
</body>
</html>
