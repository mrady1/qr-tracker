<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
</head>
<body>
  <p>Redirecting to <a href="https://www.cbre.com/people/conor-brennan#properties">Conor Brennan Listings</a>...</p>
  <script>
    var DEST = "https://www.cbre.com/people/conor-brennan#properties";
    var counted = false;

    function go() {
      if (!counted) { counted = true; window.location.replace(DEST); }
    }

    // Count the scan using keepalive so the request survives navigation
    try {
      fetch("https://api.counterapi.dev/v1/mrady1-qr/cb-postcard/up", {
        mode: "cors",
        keepalive: true
      });
    } catch(e) {}

    // Also fire a backup using an image beacon
    var img = new Image();
    img.src = "https://api.counterapi.dev/v1/mrady1-qr/cb-postcard/up?_=" + Date.now();

    // Redirect after a short delay to ensure the request is sent
    setTimeout(go, 800);
  </script>
</body>
</html>
